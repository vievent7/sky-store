<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creer un compte — Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div class="auth" style="width:100%;max-width:420px">
    <div style="text-align:center;margin-bottom:24px">
      <a href="/" style="display:inline-flex;align-items:center;gap:10px;font-family:var(--font-title);font-size:1.4rem;color:white;text-decoration:none">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#4a90d9" stroke-width="1.5"/><circle cx="14" cy="14" r="3" fill="#4a90d9"/><circle cx="8" cy="9" r="1.5" fill="#aaccff"/><circle cx="20" cy="8" r="1" fill="#aaccff"/></svg>
        Sky Store
      </a>
    </div>

    <h1 style="text-align:center;font-size:1.3rem;font-weight:600;color:white;margin:0 0 20px">Creer un compte</h1>

    <div id="reg-msg"></div>
    <div id="form-register">
      <div class="form-group"><label>Nom</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Votre nom"></div>
      <div class="form-group"><label>Email</label>
        <input type="email" id="reg-email" class="form-control" placeholder="votre@email.com"></div>
      <div class="form-group"><label>Mot de passe</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Min. 6 caracteres"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doRegister()">Creer mon compte</button>
    </div>

    <div style="margin-top:20px;text-align:center">
      <a href="/login" style="font-size:.9rem">Deja un compte ? Se connecter</a>
    </div>
    <div style="margin-top:12px;text-align:center">
      <a href="/" style="font-size:.9rem">Continuer sans compte</a>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement — Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="/" class="logo"><img src="/images/sky-store-logo.jpg" alt="Sky Store logo" class="logo-mark">Sky Store</a>
  <div class="nav-links">
    <a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/cart">Panier</a>
  </div>
</div></nav>

<section class="section" style="padding-top:40px">
  <div class="container" style="max-width:560px">
    <div class="card" style="text-align:center">
      <svg width="64" height="64" fill="none" style="margin:0 auto 20px">
        <circle cx="32" cy="32" r="30" stroke="#4a90d9" stroke-width="1.5"/>
        <rect x="18" y="20" width="28" height="20" rx="3" stroke="#4a90d9" stroke-width="1.5"/>
      </svg>
      <h2 style="margin-bottom:12px">Paiement securise</h2>
      <p id="checkout-total" style="font-size:2rem;font-weight:700;color:var(--accent2);margin:16px 0"></p>
      <p style="color:var(--text-muted);margin-bottom:24px">Vous allez etre redirige vers Stripe pour completer le paiement.</p>
      <button onclick="handleCheckout()" class="btn btn-primary btn-lg" style="width:100%">Payer maintenant</button>
      <p style="font-size:.8rem;color:var(--text-muted);margin-top:16px">Stripe gere le paiement de maniere securisee.</p>
    </div>
  </div>
</section>
<script src="/js/app.js"></script>
<footer><div class="container footer-inner"><div class="footer-brand"><strong>Sky Store</strong></div>
  <div class="footer-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/cgu">CGU</a><a href="/privacy">Confidentialité</a><a href="/account">Mon compte</a></div>
  <div class="footer-legal"><small>&copy; 2026 Sky Store. Tous droits réservés.</small></div></div></footer>
</body>
</html>

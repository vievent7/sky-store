<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublie - Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div class="auth" style="width:100%;max-width:420px">
    <h1 style="text-align:center;font-size:1.3rem;font-weight:600;color:white;margin:0 0 20px">Mot de passe oublie</h1>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:20px">Entrez votre email pour recevoir un lien de reinitialisation.</p>
    <div id="forgot-msg"></div>
    <div class="form-group"><label>Email</label><input type="email" id="forgot-email" class="form-control" placeholder="votre@email.com"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doForgotPassword()">Envoyer le lien</button>
    <div style="margin-top:20px;text-align:center"><a href="/login" style="font-size:.9rem">Retour connexion</a></div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier — Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="/" class="logo"><img src="/images/sky-store-logo.jpg" alt="Sky Store logo" class="logo-mark">Sky Store</a>
  <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="nav-links">
    <a href="/">Accueil</a><a href="/choose-sky">Creer ma carte</a><a href="/gallery">Galerie</a><a href="/cart" class="active">Panier <span id="cart-count" class="badge"></span></a><a href="/account" id="nav-account">Mon compte</a>
  </div>
</div></nav>

<section class="section" style="padding-top:40px">
  <div class="container">
    <h1 style="margin-bottom:32px">Mon Panier</h1>
    <div class="cart-layout">
      <div id="cart-items"></div>
      <div id="cart-summary" class="cart-summary"></div>
    </div>
    <div style="margin-top:24px;text-align:center">
      <button class="btn btn-ghost btn-sm" onclick="clearCart()" style="color:var(--text-muted)">Vider le panier</button>
    </div>
  </div>
</section>

<footer><div class="container footer-inner"><div class="footer-brand"><strong>Sky Store</strong></div>
  <div class="footer-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/cgu">CGU</a><a href="/privacy">Confidentialité</a><a href="/account">Mon compte</a></div>
  <div class="footer-legal"><small>&copy; 2026 Sky Store. Tous droits réservés.</small></div></div></footer>
<script src="/js/app.js?t=3"></script>
</body>
</html>

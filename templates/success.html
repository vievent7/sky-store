<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirme â€” Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-page { min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .success-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; max-width: 560px; width: 100%; text-align: center; }
    .success-icon { width: 72px; height: 72px; background: rgba(61,186,120,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .success-icon svg { width: 40px; height: 40px; stroke: #3dba78; }
    .success-title { font-family: Georgia, serif; font-size: 1.8rem; color: var(--text); margin-bottom: 12px; }
    .success-message { color: var(--text-muted); font-size: .95rem; line-height: 1.6; margin-bottom: 24px; }
    .order-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: left; }
    .order-box h3 { font-size: .9rem; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .order-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .9rem; }
    .order-row:last-child { border-bottom: none; }
    .order-row .label { color: var(--text-muted); }
    .order-row .value { font-weight: 600; color: var(--text); }
    .order-row .value.ok { color: #3dba78; }
    .btn { display: inline-block; padding: 12px 28px; border-radius: 10px; font-weight: 600; font-size: .95rem; cursor: pointer; border: none; text-decoration: none; transition: opacity .2s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent2); color: white; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); margin-left: 8px; }
    .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .downloads-list { margin-top: 16px; text-align: left; }
    .downloads-list h4 { font-size: .85rem; color: var(--text-muted); margin-bottom: 8px; }
    .download-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; font-size: .85rem; }
    .download-item .name { color: var(--text); }
    .download-item .btn-sm { padding: 6px 14px; font-size: .8rem; background: var(--accent2); color: white; border-radius: 6px; text-decoration: none; }
    .mock-badge { display: inline-block; background: rgba(255,200,80,.15); border: 1px solid rgba(255,200,80,.4); color: #e8c040; padding: 4px 12px; border-radius: 20px; font-size: .75rem; margin-bottom: 16px; }
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="/" class="logo"><img src="/images/sky-store-logo.jpg" alt="Sky Store logo" class="logo-mark">Sky Store</a>
  <div class="nav-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/ambiances">Ambiances</a><a href="/account">Mon compte</a></div>
</div></nav>

<div class="success-page">
  <div class="success-card" id="success-content">
    <div style="padding:40px;text-align:center;color:var(--text-muted)">Chargement...</div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const mock = params.get('mock') === 'true';
  const container = document.getElementById('success-content');

  if (mock) {
    // Appeler checkStatus pour finaliser la commande (generer tokens, passer a 'paid')
    var sp = new URLSearchParams({ session_id: params.get('session_id'), order_id: params.get('order_id') });
    await fetch('/api/checkout/status?' + sp.toString());
    container.innerHTML = `
      <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <span class="mock-badge">MODE SIMULATION - Paiement non reel</span>
      <h1 class="success-title">Paiement confirme!</h1>
      <p class="success-message">Votre commande a ete enregistree. En mode simulation, aucun paiement reel n'a ete effectue.</p>
      <div class="btn-group">
        <a href="/account" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Voir mes commandes
        </a>
        <a href="/" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    `;
  } else {
    // Finaliser la commande aussi en mode reel
    var sp = new URLSearchParams({ session_id: params.get('session_id'), order_id: params.get('order_id') });
    await fetch('/api/checkout/status?' + sp.toString());
    container.innerHTML = `
      <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
      <h1 class="success-title">Paiement reussi!</h1>
      <p class="success-message">Merci pour votre commande! Vos fichiers sont prets au telechargement.</p>
      <div class="btn-group">
        <a href="/account" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Acceder a mes fichiers
        </a>
        <a href="/" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:6px"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    `;
  }
})();
</script>

<footer><div class="container footer-inner"><div class="footer-brand"><strong>Sky Store</strong></div>
  <div class="footer-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/ambiances">Ambiances</a><a href="/cgu">CGU</a><a href="/privacy">Confidentialite</a><a href="/account">Mon compte</a></div>
  <div class="footer-legal"><small>&copy; 2026 Sky Store. Tous droits reserves.</small></div></div></footer>
</body>
</html>

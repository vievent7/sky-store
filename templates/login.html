<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div class="auth" style="width:100%;max-width:420px">
    <div style="text-align:center;margin-bottom:24px">
      <a href="/" style="display:inline-flex;align-items:center;gap:10px;font-family:var(--font-title);font-size:1.4rem;color:white;text-decoration:none">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#4a90d9" stroke-width="1.5"/><circle cx="14" cy="14" r="3" fill="#4a90d9"/><circle cx="8" cy="9" r="1.5" fill="#aaccff"/><circle cx="20" cy="8" r="1" fill="#aaccff"/></svg>
        Sky Store
      </a>
    </div>

    <!--Etat connecte : affiche ceci si utilisateur connecte-->
    <div id="connected-panel" style="display:none;text-align:center">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:32px 24px">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5" style="margin-bottom:12px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <p style="color:var(--text-muted);margin:0 0 6px;font-size:.9rem">Connecte en tant que</p>
        <p id="connected-name" style="font-size:1.2rem;font-weight:700;color:white;margin:0 0 20px"></p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="/account" class="btn btn-primary">Mon compte</a>
          <button class="btn btn-ghost" onclick="doLogout()" style="width:100%">Se deconnecter</button>
        </div>
      </div>
    </div>

    <!--Formulaires-->
    <div id="auth-forms">
      <div class="tabs" style="margin-bottom:20px">
        <div class="tab" onclick="showTab('login')">Connexion</div>
        <div class="tab active" onclick="showTab('register')">S'inscrire</div>
      </div>
      <div id="login-msg"></div>
      <div id="form-login" style="display:none">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" class="form-control" placeholder="votre@email.com"></div>
        <div class="form-group"><label>Mot de passe</label><input type="password" id="login-password" class="form-control" placeholder="******"></div>
        <div style="text-align:right;margin:-6px 0 12px 0"><a href="/forgot-password" style="font-size:.85rem">Mot de passe oublie ?</a></div>
        <div id="login-success" style="display:none;margin-bottom:12px;padding:10px 14px;background:rgba(61,186,120,.15);border:1px solid var(--success);border-radius:8px;color:var(--success);font-size:.9rem"></div>
        <button class="btn btn-primary" onclick="doLogin()">Se connecter</button>
      </div>
      <div id="form-register">
        <div class="form-group"><label>Nom</label><input type="text" id="reg-name" class="form-control" placeholder="Votre nom"></div>
        <div class="form-group"><label>Email</label><input type="email" id="reg-email" class="form-control" placeholder="votre@email.com"></div>
        <div class="form-group"><label>Mot de passe</label><input type="password" id="reg-password" class="form-control" placeholder="Min. 6 caracteres"></div>
        <div class="form-group"><label>Confirmer le mot de passe</label><input type="password" id="reg-password-confirm" class="form-control" placeholder="Retapez le mot de passe"></div>
        <div id="reg-msg"></div>
        <button class="btn btn-primary" onclick="doRegister()">Creer un compte</button>
      </div>
      <div style="margin-top:20px;text-align:center">
        <a href="/" style="font-size:.9rem">Continuer sans compte</a>
      </div>
    </div>
  </div>
</div>
<script>
var currentUser = null;
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  if (tab === 'login') document.querySelector('.tab:first-child').classList.add('active');
  else document.querySelector('.tab:last-child').classList.add('active');
}
</script>
<script src="/js/app.js"></script>
<script>
// Affiche l'etat connecte si logged in (app.js a charge currentUser)
if (typeof currentUser !== 'undefined' && currentUser) {
  document.getElementById('connected-panel').style.display = 'block';
  document.getElementById('auth-forms').style.display = 'none';
  document.getElementById('connected-name').textContent = currentUser.name;
}
</script>
<footer><div class="container footer-inner"><div class="footer-brand"><strong>Sky Store</strong></div>
  <div class="footer-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/cgu">CGU</a><a href="/privacy">Confidentialité</a></div>
  <div class="footer-legal"><small>&copy; 2026 Sky Store. Tous droits réservés.</small></div></div></footer>
</body>
</html>

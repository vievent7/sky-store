<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar"><div class="nav-inner"><a href="/" class="logo"><img src="/images/sky-store-logo.jpg" alt="Sky Store logo" class="logo-mark">Sky Store Admin</a>
  <div class="nav-links">
    <a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/account">Compte client</a>
    <a href="/" onclick="doLogout()" style="margin-left:auto">Deconnexion</a>
  </div>
</div></nav>

<section class="section" style="padding-top:40px">
  <div class="container">
    <h1 style="margin-bottom:8px">Administration</h1>
    <p style="color:var(--text-muted);margin-bottom:32px">Panneau d'administration Sky Store</p>

    <div id="admin-stats" class="stats" style="margin-bottom:32px"></div>

    <div class="admin-tabs" style="display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border)">
      <div class="admin-tab account-tab" data-section="users" onclick="switchAdminTab(this)">Utilisateurs</div>
      <div class="admin-tab account-tab active" data-section="orders" onclick="switchAdminTab(this)">Commandes</div>
    </div>

    <div id="admin-users" class="admin-section hidden">
      <div id="admin-users-list"></div>
      <div id="admin-user-detail" style="margin-top:20px;display:none"></div>
    </div>

    <div id="admin-orders" class="admin-section">
      <div class="admin-filters">
        <div class="filter-group">
          <label>Statut</label>
          <select id="filter-status" onchange="loadAdminOrders()">
            <option value="">Tous</option>
            <option value="pending">En attente</option>
            <option value="paid">Payee</option>
            <option value="delivered">Livree</option>
            <option value="cancelled">Annulee</option>
          </select>
        </div>
        <div class="filter-group">
          <label>De</label>
          <input type="date" id="filter-from" onchange="loadAdminOrders()">
        </div>
        <div class="filter-group">
          <label>A</label>
          <input type="date" id="filter-to" onchange="loadAdminOrders()">
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadAdminOrders()">Filtrer</button>
      </div>
      <div id="admin-orders-list"></div>
    </div>
  </div>
</section>

<style>
.admin-tab { padding: 12px 20px; color: var(--text-muted); font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.admin-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }
.admin-section { display: none; }
.admin-section.active { display: block; }
</style>

<script src="/js/app.js"></script>
<script>
function switchAdminTab(el) {
  document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.admin-section').forEach(function(s) { s.classList.add('hidden'); });
  el.classList.add('active');
  document.getElementById('admin-' + el.dataset.section).classList.add('active');
}
</script>
<footer><div class="container footer-inner"><div class="footer-brand"><strong>Sky Store</strong></div>
  <div class="footer-links"><a href="/">Accueil</a><a href="/gallery">Galerie</a><a href="/cgu">CGU</a><a href="/privacy">Confidentialité</a></div>
  <div class="footer-legal"><small>&copy; 2026 Sky Store. Tous droits réservés.</small></div></div></footer>
</body>
</html>

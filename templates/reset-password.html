<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe - Sky Store</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
  <div class="auth" style="width:100%;max-width:420px">
    <h1 style="text-align:center;font-size:1.3rem;font-weight:600;color:white;margin:0 0 20px">Nouveau mot de passe</h1>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:20px">Choisissez un nouveau mot de passe.</p>
    <div id="reset-msg"></div>
    <div class="form-group"><label>Nouveau mot de passe</label><input type="password" id="reset-password" class="form-control" placeholder="Min. 6 caracteres"></div>
    <div class="form-group"><label>Confirmer le mot de passe</label><input type="password" id="reset-password-confirm" class="form-control" placeholder="Retapez le mot de passe"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doResetPassword()">Reinitialiser</button>
    <div style="margin-top:20px;text-align:center"><a href="/login" style="font-size:.9rem">Retour connexion</a></div>
  </div>
</div>
<script src="/js/app.js"></script>
</body>
</html>

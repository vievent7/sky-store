<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Store — Apercu produit final</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060c18; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    h1 { color: #d8e8f8; font-family: Georgia, serif; font-size: 1.4rem; margin-bottom: 6px; text-align: center; }
    p { color: #6888aa; font-size: .85rem; margin-bottom: 20px; text-align: center; }
    .badge { display: inline-block; background: rgba(74,144,217,.2); border: 1px solid rgba(74,144,217,.4); border-radius: 20px; padding: 4px 14px; font-size: .75rem; color: #4a90d9; margin-bottom: 20px; }
    .svg-container { width: 100%; max-width: 600px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
    .svg-container img, .svg-container object { width: 100%; height: auto; display: block; }
    .info { margin-top: 16px; color: #6888aa; font-size: .8rem; text-align: center; }
    a { color: #4a90d9; }
    .nav { margin-bottom: 20px; }
    .nav a { color: #4a90d9; text-decoration: none; font-size: .9rem; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/">← Retour au site</a>
  </nav>

  <span class="badge">PRODUIT FINAL — HD sans filigrane</span>
  <h1>Une nuit sous les etoiles</h1>
  <p>Montreal, Canada &nbsp;·&nbsp; 14 juillet 2024 &nbsp;·&nbsp; 22:30</p>

  <div class="svg-container">
    <img src="/demo/demo_carte.svg" alt="Carte du ciel" style="width:100%;height:auto;display:block;background:#060c18">
  </div>

  <p class="info">
    Fichier SVG HD (100 KB) —&nbsp;
    <a href="/demo/demo_carte.svg" download="sky_store_demo.svg">Telecharger SVG</a>
  </p>
</body>
</html>
